# Clean Sweep Configuration File

MESSAGE_RETENTION_DAYS = 7  # Number of days to retain messages before deletion
MESSAGE_CHECK_INTERVAL = 60  # Time in seconds between checks for old messages
LOGGING_ENABLED = True  # Enable or disable logging of deleted messages
LOG_FILE_PATH = "logs/"  # File path or folder path for logs, e.g. clean_sweep.log, logs/, or /app/logs/
LOG_COMPRESS_THRESHOLD_MB = 10  # Compress the active log file into a .gz archive when it exceeds this size in MB (0 = disabled)
DELETE_CS_MESSAGES = True  # Whether to delete messages sent by the bot itself
DELETE_PINNED_MESSAGES = False  # Whether to delete pinned messages
DELETE_MESSAGES_WITH_ATTACHMENTS = True  # Whether to delete messages that contain attachments
DELETE_MESSAGES_FROM_BOTS = True  # Whether to delete messages sent by other bots
DELETE_MESSAGES_FROM_USERS = True  # Whether to delete messages sent by regular users
MESSAGE_BACKUP_ENABLED = True  # Enable or disable backup of messages before deletion
BACKUP_FILE_PATH = "backups/"  # File path or folder path for backups, e.g. message_backup.json, backups/, or /app/backups/
BACKUP_COMPRESS_THRESHOLD_MB = 10  # Compress backup file into a .gz archive when it exceeds this size in MB (0 = disabled)
DELETE_RATE_LIMIT_SECONDS = 1.0  # Seconds to wait between each message deletion (minimum 0.5 recommended)